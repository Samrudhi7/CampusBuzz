<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CampusBuzz — Sign In</title>
  <link rel="stylesheet" href="style.css">
  


  <style>
    :root {
      --neon: #00ffff;
    }

    /* Ensure the section doesn’t collapse */
    .section {
      opacity: 1 !important;
      transform: none !important;
      display: flex !important;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      padding: 2rem 1rem;
    }

    /* Main form container */
    .auth-form {
      background: #111;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 15px rgba(0,255,255,0.2);
      width: 100%;
      max-width: 400px;
      min-width: 280px; /* prevent form from shrinking too much */
      animation: fadeInUp 0.8s ease forwards;
    }

    .headline {
      color: var(--neon);
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.3;
    }

    /* Fields and labels */
    .field {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .field input {
      width: 100%;
      padding: 0.9rem 0.75rem;
      background: transparent;
      border: 2px solid var(--neon);
      border-radius: 6px;
      color: #fff;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
    }

    .field label {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: #cbd6e0;
      pointer-events: none;
      transition: all 0.3s ease;
      background: #111;
      padding: 0 4px;
    }

    .field input:focus + label,
    .field input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 0.75rem;
      color: var(--neon);
    }

    /* Popup styles */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .popup {
      background: #1a1a1a;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 10px var(--neon);
      text-align: center;
      color: white;
      width: 90%;
      max-width: 400px;
      min-width: 280px;
    }

    .popup input {
      width: 100%;
      margin-top: 1rem;
      padding: 0.7rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 0.5rem;
      color: white;
      font-size: 1rem;
    }

    .popup button {
      margin-top: 1rem;
      padding: 0.7rem 1.2rem;
      background: var(--neon);
      color: #000;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
    }

    /* Accessibility focus states */
    input:focus-visible,
    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--neon);
      outline-offset: 3px;
    }

    /* Responsive font sizing */
    body {
      font-size: clamp(0.9rem, 1.8vw, 1rem);
    }

    /* Prevent text and buttons from becoming too small */
    @media (max-width: 420px) {
      .auth-form {
        padding: 1.5rem;
      }

      .headline {
        font-size: 1.4rem;
      }

      button,
      input {
        font-size: 1rem;
      }
    }

    /* Animation */
    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="header" role="banner">
    <div class="brand">
      <div class="logo" aria-label="CampusBuzz Logo">CB</div>
      <div>
        <div class="title">CampusBuzz</div>
        <div class="sub">Events · Clubs · Campus Life</div>
      </div>
    </div>

    <nav class="nav" role="navigation" aria-label="Main Navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </nav>

    <button class="hamburger" aria-label="Menu" aria-expanded="false">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </button>
  </header>

  <main id="main-content" tabindex="-1">
    <section class="section reveal" aria-labelledby="signin-heading">
      <form id="signin-form" class="auth-form" aria-describedby="signin-desc">
        <h1 id="signin-heading" class="headline">Sign In</h1>
        <p id="signin-desc" class="visually-hidden">
          Enter your registered email and password to access CampusBuzz.
        </p>

        <div class="field">
          <input type="email" name="email" id="email" required aria-required="true" autocomplete="username" placeholder=" " />
          <label for="email">Email</label>
        </div>

        <div class="field">
          <input type="password" name="password" id="password" required aria-required="true" autocomplete="current-password" placeholder=" " />
          <label for="password">Password</label>
        </div>

        <div style="text-align:right;margin-bottom:1rem;">
          <a href="forgot_password.html" style="color:var(--neon);font-size:0.9rem;">Forgot password?</a>
        </div>

        <button type="submit" class="btn neon" aria-label="Sign in to your CampusBuzz account">Sign In</button>

        <p style="text-align:center;margin-top:1rem;color:#cbd6e0">
          Don’t have an account?
          <a href="signup.html" style="color:var(--neon)">Create one</a>
        </p>
      </form>
    </section>
  </main>

  <div class="popup-overlay" id="admin-popup" role="dialog" aria-modal="true" aria-labelledby="admin-title">
    <div class="popup">
      <h2 id="admin-title">Admin Verification</h2>
      <p>Enter your Admin Key to continue</p>
      <input type="password" id="admin-key" placeholder="Admin Key" aria-label="Admin Key" />
      <button id="verify-admin">Verify</button>
    </div>
  </div>

  <footer class="footer" role="contentinfo">
    © 2025 CampusBuzz — Built for students
  </footer>

  <script>
    const form = document.getElementById('signin-form');
    const popup = document.getElementById('admin-popup');
    const verifyBtn = document.getElementById('verify-admin');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      // Simple admin check
      if (email.toLowerCase().includes('admin')) {
        popup.style.display = 'flex';
      } else {
        this.action = 'signin.php';
        this.method = 'POST';
        this.submit();
      }
    });

    verifyBtn.addEventListener('click', function() {
      const adminKey = document.getElementById('admin-key').value.trim();
      if (adminKey === '') {
        alert('Please enter your admin key.');
        return;
      }

      const hiddenKey = document.createElement('input');
      hiddenKey.type = 'hidden';
      hiddenKey.name = 'admin_key';
      hiddenKey.value = adminKey;
      form.appendChild(hiddenKey);

      popup.style.display = 'none';
      form.action = 'signin.php';
      form.method = 'POST';
      form.submit();
    });
  </script>
</body>
</html>
